name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Set up local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Fix gradle.properties
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug > build.log 2>&1 || true

      - name: Show error
        run: |
          echo "=== НАЧАЛО ЛОГА ==="
          head -80 build.log
          echo "=== СТРОКИ С ОШИБКОЙ ==="
          grep -n "error:\|Error:\|Could not\|Unresolved\|Exception" build.log | head -20

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
