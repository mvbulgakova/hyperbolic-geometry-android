
name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.7/bin" >> $GITHUB_PATH
      - name: Generate Gradle Wrapper
        run: gradle wrapper
      - name: Set up local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Fix gradle.properties
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
      - name: Create missing resource files
        run: |
          mkdir -p app/src/main/res/xml
          cat > app/src/main/res/xml/data_extraction_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
                  <include domain="sharedpref" path="."/>
              </cloud-backup>
          </data-extraction-rules>
          EOF
          cat > app/src/main/res/xml/backup_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
          </full-backup-content>
          EOF
          for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p app/src/main/res/mipmap-$dpi
            python3 -c "
          import struct, zlib
          def png(w,h,color):
              def chunk(t,d): c=zlib.crc32(t+d)&0xffffffff; return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+bytes(color)*w for _ in range(h))
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('app/src/main/res/mipmap-$dpi/ic_launcher.png','wb').write(png(48,48,[98,0,238]))
          open('app/src/main/res/mipmap-$dpi/ic_launcher_round.png','wb').write(png(48,48,[98,0,238]))
          "
          done
      - name: Patch source code
        run: |
          python3 - << 'PYEOF'
          import os, re
          base = "app/src/main/java/com/hyperbolic/geometry"

          with open(f"{base}/rendering/GLStubs.kt", "w") as f:
              f.write("package com.hyperbolic.geometry.rendering\n"
                      "internal const val GL_AMBIENT_DIFFUSE = 0x1602\n"
                      "internal fun glBegin(mode: Int) {}\n"
                      "internal fun glEnd() {}\n"
                      "internal fun glVertex3f(x: Float, y: Float, z: Float) {}\n")

          os.makedirs(f"{base}/ui/components", exist_ok=True)
          with open(f"{base}/ui/components/SliderWithLabel.kt", "w") as f:
              f.write("package com.hyperbolic.geometry.ui.components\n"
                      "import androidx.compose.material3.Slider\n"
                      "import androidx.compose.material3.Text\n"
                      "import androidx.compose.runtime.Composable\n"
                      "import androidx.compose.ui.Modifier\n"
                      "@Composable\n"
                      "fun SliderWithLabel(label: String, value: Float, onValueChange: (Float) -> Unit, valueRange: ClosedFloatingPointRange<Float> = 0f..1f, modifier: Modifier = Modifier) {\n"
                      "    Text(label)\n"
                      "    Slider(value = value, onValueChange = onValueChange, valueRange = valueRange, modifier = modifier)\n"
                      "}\n")

          with open(f"{base}/ui/screens/BundleScreen.kt", "r") as f:
              content = f.read()
          content = re.sub(
              r"^(package [^\n]+\n)",
              r"\1import androidx.compose.foundation.verticalScroll\nimport androidx.compose.foundation.rememberScrollState\nimport com.hyperbolic.geometry.ui.components.SliderWithLabel\n",
              content, flags=re.MULTILINE)
          with open(f"{base}/ui/screens/BundleScreen.kt", "w") as f:
              f.write(content)

          with open(f"{base}/ui/screens/SphereScreen.kt", "r") as f:
              content = f.read()
          content = content.replace("'%.2f'", '"%.2f"')
          with open(f"{base}/ui/screens/SphereScreen.kt", "w") as f:
              f.write(content)

          with open(f"{base}/rendering/GLSurfaceViewWrapper.kt", "r") as f:
              content = f.read()
          content = content.replace("ACTION_POINTER_MOVE", "ACTION_MOVE")
          with open(f"{base}/rendering/GLSurfaceViewWrapper.kt", "w") as f:
              f.write(content)

          with open(f"{base}/ui/theme/Theme.kt", "r") as f:
              old = f.read()
          m = re.search(r"fun (\w+Theme)", old)
          theme_fn = m.group(1) if m else "HyperbolicGeometryTheme"
          with open(f"{base}/ui/theme/Theme.kt", "w") as f:
              f.write(f"package com.hyperbolic.geometry.ui.theme\n"
                      f"import androidx.compose.material3.MaterialTheme\n"
                      f"import androidx.compose.material3.darkColorScheme\n"
                      f"import androidx.compose.material3.lightColorScheme\n"
                      f"import androidx.compose.runtime.Composable\n"
                      f"import androidx.compose.ui.graphics.Color\n"
                      f"private val Dark = darkColorScheme(primary=Color(0xFF6650A4),secondary=Color(0xFF625B71),tertiary=Color(0xFF7D5260))\n"
                      f"private val Light = lightColorScheme(primary=Color(0xFF6650A4),secondary=Color(0xFF625B71),tertiary=Color(0xFF7D5260))\n"
                      f"@Composable\n"
                      f"fun {theme_fn}(darkTheme: Boolean = false, content: @Composable () -> Unit) {{\n"
                      f"    MaterialTheme(colorScheme = if (darkTheme) Dark else Light, content = content)\n"
                      f"}}\n")
          PYEOF
          sed -i '/kotlinOptions/a\            freeCompilerArgs += ["-opt-in=androidx.compose.material3.ExperimentalMaterial3Api"]' app/build.gradle
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug > build.log 2>&1 || true
      - name: Show error if failed
        run: |
          head -80 build.log
          echo "==="
          grep -n "error:\|Error:\|Could not\|Unresolved\|Exception\|FAILED" build.log | head -30
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
